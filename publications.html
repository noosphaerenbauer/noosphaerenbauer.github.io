<!DOCTYPE HTML>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.1.3/dist/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">
  <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

  <title>Ameya Prabhu | Publications</title>

  <meta name="author" content="Ameya Prabhu">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Publications by Ameya Prabhu.">
  <link rel="canonical" href="https://noosphaerenbauer.github.io/publications.html">

  <meta property="og:title" content="Ameya Prabhu | Publications">
  <meta property="og:description" content="Publications by Ameya Prabhu.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://noosphaerenbauer.github.io/publications.html">

  <meta name="twitter:title" content="Ameya Prabhu | Publications">
  <meta name="twitter:description" content="Publications by Ameya Prabhu.">

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" integrity="sha512-SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" type="text/css" href="stylesheet.css">
  <link rel="icon" type="image/png" href="pictures/photo.png">

  <script src="data/publications.js"></script>
  <script src="data/authors.js"></script>
  <script src="js/publications.js"></script>
</head>

<body>
  <div class="theme-switch-wrapper">
    <span class="darkmode-label">Light</span>
    <label class="theme-switch" for="checkbox">
      <input type="checkbox" id="checkbox" />
      <div class="slider"></div>
    </label>
    <span class="darkmode-label">Dark</span>
  </div>

  <main>
    <div class="container" style="padding-top: 14px;">
      <div class="row section-heading-rows align-items-center justify-content-between">
        <div class="col-auto">
          <h3 class="mb-0">Publications</h3>
        </div>
        <div class="col-auto">
          <a href="index.html" class="publication-home-link" aria-label="Back to home">
            <i class="fas fa-house-chimney"></i>
            <span>Home</span>
          </a>
        </div>
      </div>

      <div class="row mb-2">
        <div class="col-12" id="author-marker-legend" aria-label="Author marker legend">
          <small class="text-muted">(
            <span class="legend-item"><sup class="author-marker cofirst">*</sup> shared lead</span>
            <span class="legend-item"><sup class="author-marker colast">†</sup> shared advising</span>
            <span class="legend-item"><sup class="author-marker core">◦</sup> core contributors</span>
            )</small>
        </div>
      </div>

      <div class="row mb-3">
        <div class="col-12">
          <div class="publication-view-toggle" role="tablist" aria-label="Publication views">
            <button type="button" class="publication-view-button is-active" data-publication-view="date" aria-selected="true">By Date</button>
            <button type="button" class="publication-view-button" data-publication-view="topic" aria-selected="false">By Topic</button>
          </div>
        </div>
      </div>

      <div id="publications-container"></div>
    </div>

    <script>
      const toggleSwitch = document.querySelector('#checkbox');
      const currentTheme = localStorage.getItem('theme');

      function setTheme(theme) {
        document.documentElement.setAttribute('data-theme', theme);
        localStorage.setItem('theme', theme);
        toggleSwitch.checked = theme === 'dark';
      }

      if (currentTheme) {
        setTheme(currentTheme);
      } else if (window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches) {
        setTheme('dark');
      } else {
        setTheme('light');
      }

      toggleSwitch.addEventListener('change', function(e) {
        if (e.target.checked) {
          setTheme('dark');
        } else {
          setTheme('light');
        }
      });

      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        const newTheme = e.matches ? 'dark' : 'light';
        if (!localStorage.getItem('theme')) {
          setTheme(newTheme);
        }
      });
    </script>
  </main>
</body>
</html>
